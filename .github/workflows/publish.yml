name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.19.0
          registry-url: https://registry.npmjs.org/

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Use npm 11
        run: bun add --global npm@11

      - name: Show tool versions
        run: |
          node --version
          bun --version
          npm --version

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Tool smoke
        run: bun run test:tools

      - name: Verify tag matches package version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${VERSION}"

          if [ "${EXPECTED_TAG}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${VERSION}. Expected ${EXPECTED_TAG}."
            exit 1
          fi

          if [[ "${VERSION}" == *-* ]]; then
            echo "Pre-release publishing requires an explicit npm dist-tag and is not handled by this workflow."
            exit 1
          fi

      - name: Verify version is not already published
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"

          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${VERSION} is already published."
            exit 1
          fi

      - name: Verify package contents
        run: bun run package:check

      - name: Publish to npm
        run: npm publish
