name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Workflow lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run actionlint
        run: bun run lint:workflows

  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node:
          - 22.19.0
          - 24.x
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Tool contract + selection gate
        run: bun run test:selection

      - name: Tool smoke
        run: bun run test:tools

      - name: Lint
        if: matrix.node == '22.19.0'
        run: bun run lint

      - name: Format check
        if: matrix.node == '22.19.0'
        run: bun run format:check

      - name: Production dependency audit
        if: matrix.node == '22.19.0'
        run: bun run audit:strict

      - name: Verify package contents
        if: matrix.node == '22.19.0'
        run: bun run package:check

  windows-smoke:
    name: Windows smoke
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.19.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: bun run typecheck

      - name: Tool contract + selection gate
        run: bun run test:selection

      - name: Tool smoke
        run: bun run test:tools
