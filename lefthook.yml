# https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  jobs:
    - name: oxfmt
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc}"
      run: npx oxfmt {staged_files}
      stage_fixed: true
    - name: oxlint
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: npx oxlint {staged_files}
pre-push:
  parallel: false
  jobs:
    - name: oxlint
      run: npx oxlint .
    - name: typecheck
      run: npm run typecheck
    - name: test
      run: npm test
