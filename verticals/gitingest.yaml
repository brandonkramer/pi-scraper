# Vertical manifest v1 — `kind` selects the runtime in src/extract/vertical/.
version: 1
order: 5
name: gitingest
# api-json: one JSON HTTP request → extract ($.paths, {{captures}}, |transforms).
kind: api-json
description: LLM-ready GitHub repository digest via GitIngest.
urlPatterns:
  - https://github.com/:owner/:repo
  - https://gitingest.com/:owner/:repo
# Runtime requirements for the scrape host.
requirements:
  requiresBrowser: false
  requiresLLM: false
  requiresCloud: false
# Declared output facets (discovery / tooling).
capabilities:
  - repo_digest
  - file_tree
  - content_summary
source: builtin
# HTTP request (api-json / api-xml / text-extract). {{captures}} interpolate into urlTemplate.
request:
  urlTemplate: https://gitingest.com/api/{{owner|encodeURIComponent}}/{{repo|encodeURIComponent}}
  # Forward these query params from the matched user URL to the API.
  queryPassthrough:
    - max_file_size
    - pattern_type
    - pattern
# Fail extraction when this JSONPath is present in the response.
throwIf:
  path: $.error
# Output projection: api-json uses $.paths; aggregate/chain/workflow use @.scope and |transforms.
extract:
  owner: "{{owner}}"
  repo: "{{repo}}"
  repoUrl: $.repo_url
  shortRepoUrl: $.short_repo_url
  summary: $.summary
  description: $.summary|firstLine
  digestUrl: $.digest_url
  tree: $.tree|truncate:20000
  treeTruncated: $.tree|isLongerThan:20000|trueOnly
  content: $.content|truncate:50000
  contentChars: $.content|length
  contentTruncated: $.content|isLongerThan:50000|trueOnly
  defaultMaxFileSizeKb: $.default_max_file_size
  patternType: $.pattern_type
  pattern: $.pattern
