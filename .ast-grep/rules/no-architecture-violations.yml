# ============================================================================
# no-architecture-violation — canonical-home rules for pi-scraper.
#
# Each rule below maps to a specific AGENTS.md "Hard Constraint" or "Critical
# Rule". When violated, the commit is blocked with a message pointing at the
# canonical file.
#
# Why one file: these rules share the same architectural intent
# ("X must live in Y"). Grouping them keeps the architecture invariants
# discoverable in one place. Each rule keeps its own scoped `ignores` because
# ast-grep applies `ignores` per YAML document, not per the whole file.
#
# Adding a new rule: append a YAML doc below following the same shape
# (id, language, severity, message, note, rule, files, ignores). Verify by
# adding a deliberate-violation file and running `npx ast-grep scan`.
# ============================================================================

id: no-define-web-tool-elsewhere
language: TypeScript
severity: error
message: "defineWebTool() may only be called from src/tools/web-*.ts"
note: |
  Each public Pi tool gets its own src/tools/web-<name>.ts file and is wired
  up through src/tools/infra/register.ts. Calling defineWebTool() outside
  this layout fragments the tool surface that AGENTS.md keeps stable.
rule:
  pattern: defineWebTool($$$)
files:
  - "src/**/*.ts"
ignores:
  - "src/tools/web-*.ts"
  - "src/tools/infra/define.ts"
  - "**/__tests__/**"
  - "**/*.test.ts"

---
id: no-sqlite-import-elsewhere
language: TypeScript
severity: error
message: "node:sqlite must only be imported from src/storage/db/open.ts or src/storage/migrations/run.ts"
note: |
  All storage handles flow through openStorageDb() in src/storage/db/open.ts.
  Migration runner is the only other allowed importer because it owns schema
  evolution. Importing node:sqlite anywhere else bypasses connection pooling
  and migration ordering.
rule:
  any:
    - pattern: import $$$ from 'node:sqlite'
    - pattern: import $$$ from "node:sqlite"
files:
  - "src/**/*.ts"
ignores:
  - "src/storage/db/open.ts"
  - "src/storage/migrations/run.ts"
  - "**/__tests__/**"
  - "**/*.test.ts"

---
id: no-undici-import-elsewhere
language: TypeScript
severity: error
message: "undici must only be imported from src/http/. All network I/O goes through src/http/client.ts."
note: |
  AGENTS.md: "Network I/O belongs in src/http/. SSRF protection MUST validate
  at connect and redirect time because DNS preflight alone is not sufficient."

  Direct undici imports outside src/http/ skip the SSRF guard, retry policy,
  redirect handling, and politeness layer. Use createHttpClient() from
  src/http/client.ts instead.
rule:
  any:
    - pattern: import $$$ from 'undici'
    - pattern: import $$$ from "undici"
files:
  - "src/**/*.ts"
ignores:
  - "src/http/**/*.ts"
  - "**/__tests__/**"
  - "**/*.test.ts"

---
id: no-robots-parser-elsewhere
language: TypeScript
severity: error
message: "robots-parser must only be imported from src/http/robots.ts"
note: |
  AGENTS.md: "Default to respectRobots: true". Centralizing robots-parser in
  src/http/robots.ts keeps loadRobotsText/parseRobots/robotsUrlFor consistent
  across crawl, map, and scrape paths. A second importer would fork robots
  semantics.
rule:
  any:
    - pattern: import $$$ from 'robots-parser'
    - pattern: import $$$ from "robots-parser"
files:
  - "src/**/*.ts"
ignores:
  - "src/http/robots.ts"
  - "**/__tests__/**"
  - "**/*.test.ts"

---
id: no-playwright-import-elsewhere
language: TypeScript
severity: error
message: "playwright must only be imported from src/browser/"
note: |
  AGENTS.md: "Keep Playwright peer-optional". The lazy-loaded browser path
  lives entirely in src/browser/ and is only reached when scrape mode escalates
  to "browser". Importing playwright elsewhere makes it eagerly required for
  normal installs and breaks the peer-optional install promise.
rule:
  any:
    - pattern: import $$$ from 'playwright'
    - pattern: import $$$ from "playwright"
files:
  - "src/**/*.ts"
ignores:
  - "src/browser/**/*.ts"
  - "**/__tests__/**"
  - "**/*.test.ts"

---
id: no-normalize-url-elsewhere
language: TypeScript
severity: error
message: "URL normalization must live in src/url/normalize.ts"
note: |
  Import normalizeUrl from "../url/normalize.ts" (adjust depth) instead of
  rolling your own. Inconsistent normalization causes dedupe leaks across
  crawl frontier, map output, and diff snapshots.
rule:
  any:
    - kind: function_declaration
      has:
        field: name
        regex: "^normalizeUrl$"
    - kind: variable_declarator
      has:
        field: name
        regex: "^normalizeUrl$"
files:
  - "src/**/*.ts"
ignores:
  - "src/url/normalize.ts"
  - "**/__tests__/**"
  - "**/*.test.ts"

---
id: no-tui-tools-import
language: TypeScript
severity: error
message: "src/tui/ must not import from src/tools/. Shared rendering contracts belong in src/tui/types.ts or src/types.ts."
note: |
  The TUI layer is consumed by tools, not the other way around. Tools call
  defineWebTool() with a render() function; the TUI layer provides
  components (pill, batch, envelope, etc.) and theme contracts. A reverse
  import creates a cycle and lets tool implementation details leak into
  rendering.
rule:
  kind: import_statement
  has:
    kind: string
    regex: '"[^"]*tools/[^"]*"'
files:
  - "src/tui/**/*.ts"
ignores:
  - "**/__tests__/**"
  - "**/*.test.ts"
