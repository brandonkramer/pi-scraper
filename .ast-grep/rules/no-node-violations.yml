# ============================================================================
# no-node-violations — Node.js platform-specific safety rules.
#
# In scope: rules about Node-specific API misuse where the failure mode is
# tied to Node's runtime semantics (sync I/O without try/catch, process
# lifecycle mistakes, stream/event-handler pitfalls, etc.).
#
# Out of scope: security (→ no-security-violations.yml), canonical homes
# (→ no-architecture-violation.yml), style/idiom (→ prefer-idiomatic-ts.yml).
#
# To add a new Node rule: append a YAML doc below following the same shape.
# Each rule keeps its own scope because ast-grep applies `ignores` per YAML
# document.
# ============================================================================

id: no-unchecked-sync-fs
language: TypeScript
severity: warning
message: "Unchecked sync fs call — throws on missing file or permission error"
note: |
  Synchronous filesystem calls throw on OS errors (ENOENT, EACCES, EPERM…).
  Without a try/catch the process crashes or the error propagates unchecked.

  ✅ WRAP IN TRY/CATCH:
    try {
      const stats = fs.statSync(path);
    } catch (err) {
      if ((err as NodeJS.ErrnoException).code === 'ENOENT') {
        // file doesn't exist — handle gracefully
      }
      throw err;
    }

  ✅ OR USE ASYNC (preferred for hot paths):
    const stats = await fs.promises.stat(path).catch(() => null);

rule:
  all:
    - any:
        - pattern: fs.statSync($$$)
        - pattern: fs.lstatSync($$$)
        - pattern: fs.readFileSync($$$)
        - pattern: fs.readdirSync($$$)
        - pattern: fs.writeFileSync($$$)
        - pattern: fs.appendFileSync($$$)
        - pattern: fs.unlinkSync($$$)
        - pattern: fs.rmdirSync($$$)
        - pattern: fs.rmSync($$$)
        - pattern: fs.renameSync($$$)
        - pattern: fs.copyFileSync($$$)
        - pattern: fs.accessSync($$$)
        - pattern: fs.chmodSync($$$)
        - pattern: fs.chownSync($$$)
        - pattern: fs.truncateSync($$$)
        - pattern: fs.realpathSync($$$)
        # mkdirSync without { recursive: true } can throw EEXIST
        - all:
            - pattern: fs.mkdirSync($PATH)
            - not:
                pattern: fs.mkdirSync($PATH, $$$)
    - not:
        inside:
          stopBy: end
          kind: try_statement

---
id: no-sync-fs-in-async
language: TypeScript
severity: error
message: "Sync fs call inside async function — blocks the event loop"
note: |
  Synchronous filesystem calls block the entire Node.js event loop while
  they run. Inside an async function, this defeats the point of being async:
  other timers, I/O callbacks, and pending promises all stall until the
  sync call returns.

  ❌ async function loadConfig() {
       const data = fs.readFileSync(path, "utf8"); // BLOCKS
       return JSON.parse(data);
     }
  ✅ async function loadConfig() {
       const data = await fs.promises.readFile(path, "utf8");
       return JSON.parse(data);
     }

  This is distinct from `no-unchecked-sync-fs`, which fires on any sync FS
  call without a try/catch wrapper regardless of context. This rule fires
  even with a try/catch — the event-loop hazard is unrelated to error
  handling.
rule:
  any:
    - pattern: fs.statSync($$$)
    - pattern: fs.lstatSync($$$)
    - pattern: fs.readFileSync($$$)
    - pattern: fs.readdirSync($$$)
    - pattern: fs.writeFileSync($$$)
    - pattern: fs.appendFileSync($$$)
    - pattern: fs.unlinkSync($$$)
    - pattern: fs.rmdirSync($$$)
    - pattern: fs.rmSync($$$)
    - pattern: fs.renameSync($$$)
    - pattern: fs.copyFileSync($$$)
    - pattern: fs.accessSync($$$)
    - pattern: fs.chmodSync($$$)
    - pattern: fs.chownSync($$$)
    - pattern: fs.truncateSync($$$)
    - pattern: fs.realpathSync($$$)
    - pattern: fs.mkdirSync($$$)
  inside:
    stopBy: end
    any:
      - kind: function_declaration
        has:
          regex: "^async$"
      - kind: method_definition
        has:
          regex: "^async$"
      - pattern: "async $$$ => $$$"
files:
  - "src/**/*.ts"
ignores:
  - "**/__tests__/**"
  - "**/*.test.ts"
  - "**/*.spec.ts"
